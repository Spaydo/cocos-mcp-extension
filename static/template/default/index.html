<div id="app">
    <section class="section">
        <h2>MCP Server</h2>

        <div class="row">
            <label>Status</label>
            <div class="status-container">
                <span id="status-dot" class="status-dot stopped"></span>
                <span id="status-text">Stopped</span>
            </div>
        </div>

        <div id="server-url" class="server-url" style="display:none"></div>

        <div class="row">
            <label>Enable</label>
            <ui-checkbox id="server-toggle"></ui-checkbox>
        </div>

        <div class="row">
            <label>Port</label>
            <ui-num-input id="port-input" min="1" max="65535" step="1" value="3000"></ui-num-input>
        </div>

        <div class="row">
            <label>Auto Start</label>
            <ui-checkbox id="auto-start"></ui-checkbox>
        </div>
    </section>

    <section class="section">
        <h2>Tool Categories</h2>
        <div class="category-actions">
            <button id="select-all" class="category-btn">Select All</button>
            <button id="deselect-all" class="category-btn">Deselect All</button>
            <span id="tool-count" class="tool-count"></span>
        </div>

        <div class="category-group">
            <div class="category-group-label">Core</div>
            <div id="core-categories" class="category-list"></div>
        </div>

        <div class="category-group">
            <div class="category-group-label">Advanced</div>
            <div id="advanced-categories" class="category-list"></div>
        </div>
    </section>

    <section class="section">
        <h2>Logs</h2>
        <div id="logs" class="logs-container"></div>
    </section>
</div>
